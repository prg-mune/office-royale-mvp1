<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Office Royale MVPs</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101318;
        --panel: #191f27;
        --panel-2: #202934;
        --text: #f7f8fb;
        --muted: #aab2bf;
        --line: rgba(255, 255, 255, 0.12);
        --mint: #62d6a6;
        --gold: #f4c95d;
        --sky: #65b7f3;
        --coral: #ff765f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--gold);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 7vw, 72px);
        line-height: 0.98;
      }

      .lead {
        max-width: 720px;
        margin: 18px 0 34px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        display: grid;
        min-height: 260px;
        padding: 20px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        text-decoration: none;
      }

      .card:hover,
      .card:focus-visible {
        border-color: var(--mint);
        outline: none;
      }

      .badge {
        width: fit-content;
        height: 28px;
        padding: 6px 9px;
        background: var(--panel-2);
        border-radius: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .card h2 {
        margin: 38px 0 10px;
        font-size: 25px;
      }

      .card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .play {
        align-self: end;
        margin-top: 24px;
        color: var(--mint);
        font-weight: 900;
      }

      .card:nth-child(2) .play {
        color: var(--sky);
      }

      .card:nth-child(3) .play {
        color: var(--coral);
      }

      @media (max-width: 820px) {
        main {
          padding: 32px 0;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .card {
          min-height: 210px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">OFFICE ROYALE PROTOTYPES</p>
      <h1>Office Royale</h1>
      <p class="lead">社内レクリエーション向けの大人数バトルロワイヤルMVP集です。操作感は共通で、ルールと視点を変えた3種類を試せます。</p>

      <section class="grid" aria-label="prototype list">
        <a class="card" href="variants/player-view/">
          <span class="badge">Original</span>
          <h2>Player View</h2>
          <p>自分視点で床崩壊サバイバル。長押しバーストと障害物を使って最後まで生き残る版。</p>
          <span class="play">Play</span>
        </a>

        <a class="card" href="variants/god-view/">
          <span class="badge">Host View</span>
          <h2>God View</h2>
          <p>全体俯瞰で見やすい床崩壊サバイバル。会場スクリーンや観戦デモ向け。</p>
          <span class="play">Play</span>
        </a>

        <a class="card" href="variants/elevator-rush/">
          <span class="badge">Race</span>
          <h2>Elevator Rush</h2>
          <p>横スクロールで右端のエレベーターを目指すレース型バトルロワイヤル。</p>
          <span class="play">Play</span>
        </a>
      </section>
    </main>
  </body>
</html>
